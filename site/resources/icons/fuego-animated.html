<head>
  <meta charset="UTF-8">
  <title>Fuego</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f0e8;
      min-height: 100vh;
      cursor: none;
      overflow: hidden;
    }

    #fire {
      position: fixed;
      pointer-events: none;
      /* flames positioned relative to this container which follows cursor */
    }

    .flame-wrap {
      position: absolute;
      bottom: 0;
    }

    /* fl-a: left, smallest, leans left */
    #fl-a { width: 13px; height: 28px;  left: -18px; bottom: -4px;  transform: rotate(-12deg); transform-origin: bottom center; }
    /* fl-b: center, tallest, upright */
    #fl-b { width: 16px; height: 36px;  left:  -8px; bottom:  0px; }
    /* fl-c: right, medium, leans right */
    #fl-c { width: 14px; height: 30px;  left:   4px; bottom: -6px;  transform: rotate(10deg);  transform-origin: bottom center; }

    .flame-wrap svg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
    }

    .flame-wrap svg.active { opacity: 1; }
  </style>
</head>

<script>
  // --- Flicker ---
  function startFlicker(wrapId, phaseOffset) {
    const wrap = document.getElementById(wrapId);
    const frames = Array.from(wrap.querySelectorAll('svg'));
    let current = 0;
    frames[current].classList.add('active');

    function nextFrame() {
      frames[current].classList.remove('active');
      let next;
      do { next = Math.floor(Math.random() * frames.length); } while (next === current);
      current = next;
      frames[current].classList.add('active');
      const s = parseFloat(wrap.dataset.scaleHint || 1);
      // Bigger = faster, more chaotic flicker
      const base = Math.max(30, 80 - s * 10);
      setTimeout(nextFrame, base + Math.random() * (80 / s));
    }

    setTimeout(nextFrame, phaseOffset + Math.random() * 100);
  }

  startFlicker('fl-a', 0);
  startFlicker('fl-b', 50);
  startFlicker('fl-c', 120);

  // --- Grow on click/hold ---
  // Base sizes
  const bases = {
    'fl-a': { w: 13, h: 28 },
    'fl-b': { w: 16, h: 36 },
    'fl-c': { w: 14, h: 30 },
  };
  const MAX_SCALE = 5.5;   // max growth multiplier
  const GROW_RATE = 0.06;  // per frame when held
  const DECAY_RATE = 0.03; // per frame when released

  let scale = 1;
  let holding = false;
  // Noise offset per flame for organic growth variation
  let noiseT = 0;

  document.addEventListener('mousedown', () => holding = true);
  document.addEventListener('mouseup',   () => holding = false);

  // --- Cursor follow with smooth lerp ---
  const fire = document.getElementById('fire');
  let curX = window.innerWidth / 2;
  let curY = window.innerHeight / 2;
  let posX = curX;
  let posY = curY;

  document.addEventListener('mousemove', e => {
    curX = e.clientX;
    curY = e.clientY;
  });

  function loop() {
    // Grow / shrink scale
    if (holding) {
      scale = Math.min(MAX_SCALE, scale + GROW_RATE + Math.random() * 0.02);
    } else {
      scale = Math.max(1, scale - DECAY_RATE);
    }
    noiseT += 0.08;

    // Apply scale to each flame with slight individual wobble
    for (const [id, b] of Object.entries(bases)) {
      const el = document.getElementById(id);
      const wobble = holding ? (Math.sin(noiseT + (id === 'fl-a' ? 0 : id === 'fl-b' ? 2 : 4)) * 0.08 * (scale - 1)) : 0;
      const s = scale + wobble;
      el.style.width  = (b.w * s) + 'px';
      el.style.height = (b.h * s) + 'px';
      // Faster flicker rate at bigger scale
      el.dataset.scaleHint = s;
    }

    // Lerp toward cursor
    posX += (curX - posX) * 0.18;
    posY += (curY - posY) * 0.18;

    fire.style.left = posX + 'px';
    fire.style.top  = posY + 'px';

    requestAnimationFrame(loop);
  }

  loop();
</script>
