<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 33.73 38.05" width="128" height="128">
  <defs>
    <style>
      .flame-main {
        fill: #1d1d1b;
        transform-origin: 50% 100%;
      }
      .flame-inner {
        fill: #1d1d1b;
        transform-origin: 50% 100%;
        opacity: 0.6;
      }
      .flame-spark {
        fill: #1d1d1b;
        transform-origin: 50% 100%;
      }
    </style>

    <!-- Wiggle animation for main flame -->
    <animateTransform
      id="wiggle-main"
      attributeName="transform"
      type="rotate"
      values="0 16.86 38.05; -3 16.86 38.05; 2.5 16.86 38.05; -2 16.86 38.05; 3 16.86 38.05; 0 16.86 38.05"
      dur="1.6s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
    />

    <!-- Scale pulse for breathe effect -->
    <animateTransform
      id="pulse"
      attributeName="transform"
      type="scale"
      values="1 1; 1.02 0.98; 0.98 1.02; 1.01 0.99; 1 1"
      dur="2.2s"
      repeatCount="indefinite"
      additive="sum"
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
    />
  </defs>

  <!-- Main flame body — original path, animated -->
  <g>
    <path class="flame-main"
      d="M26.57,15.21c.31.07.54.41.71.66,1.92,2.87,4.3,6.9,5.92,9.96.21.39.63,1.01.51,1.41l-6.47,8.95-.67.33c-2.29.22-4.69,1.2-6.92,1.51-1.18.16-.43-.76-.37-1.37.19-1.89.31-3.79.53-5.69.09-.76.41-1.26.2-2.2-.18-.84-2.75-3.14-3.43-4.02-.15-.19-.27-.38-.24-.63-.23,0-.35.23-.46.4-.92,1.44-1.64,3.42-2.54,4.93l1.46,8.57-7.94-2.64L.99,25.12l-.99-7.62,9.43-5.33-4.71,6.53c1.33,1.89,2.07,4.35,3.84,5.85l2.07,1.04-2.72-7.58,5.71-7.73c.04-1.05.11-2.14.06-3.2-.09-1.95-.1-4-.23-5.96-.03-.42-.61-1.22.11-1.1l11.23,12.62c.02.81.09,1.65.04,2.46-.15,2.28-1.04,4.17-1.98,6.23l1.68,5.31c.35-.03.4-.36.51-.61.21-.5,1.49-3.77,1.49-3.98l.02-6.83Z">
      <!-- Sway left-right -->
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0,0; -0.4,-0.2; 0.5,0.1; -0.3,0; 0.4,-0.1; 0,0"
        dur="1.6s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
      />
    </path>

    <!-- Small spike / ember at top left — original polygon -->
    <polygon class="flame-spark"
      points="9.94 8.94 2.23 12.51 9.97 2.23 9.94 8.94">
      <!-- Flicker scale on the spark -->
      <animateTransform
        attributeName="transform"
        type="scale"
        values="1 1; 1.08 1.05; 0.95 0.97; 1.05 1.08; 0.97 0.95; 1 1"
        dur="1.1s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
      />
      <!-- Drift upward slightly -->
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0,0; 0.2,-0.5; -0.3,-0.8; 0.1,-0.4; 0,0"
        dur="1.3s"
        repeatCount="indefinite"
        additive="sum"
        calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
      />
      <!-- Fade flicker -->
      <animate
        attributeName="opacity"
        values="1; 0.7; 1; 0.85; 0.6; 1"
        dur="1.3s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
      />
    </polygon>
  </g>
</svg>
